services:
  - type: web
    name: telegram-bot-api
    env: docker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: telegram-bot-db
          property: connectionString
      - key: TELEGRAM_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPERADMINS
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
        # WEBHOOK_URL kerak emas — Render RENDER_EXTERNAL_URL ni avtomatik beradi

databases:
  - name: telegram-bot-db
    plan: free
    databaseName: telegram_ai
    user: botuser
